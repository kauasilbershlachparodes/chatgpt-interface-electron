<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="referrer" content="no-referrer" />
    <title>Completing Google sign-in…</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0f0f10;
        color: #f5f5f5;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body { display: grid; place-items: center; }
      .card {
        width: min(460px, calc(100vw - 32px));
        padding: 24px 22px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        background: #171717;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      }
      .title { margin: 0 0 10px; font-size: 18px; font-weight: 600; line-height: 1.35; }
      .text { margin: 0; color: rgba(255, 255, 255, 0.74); font-size: 14px; line-height: 1.5; }
      .spinner {
        width: 30px; height: 30px; margin: 0 0 16px; border-radius: 999px;
        border: 3px solid rgba(255, 255, 255, 0.14); border-top-color: #1a73e8;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" aria-hidden="true"></div>
      <h1 class="title">Completing your Google sign-in</h1>
      <p class="text" id="oauth-status">Please wait while we finish the authentication flow.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/src/js/matrix-session.js"></script>
    <script src="/src/js/matrix-oauth-callback.js"></script>
  </body>
</html>
