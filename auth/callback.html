<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing in with Google</title>
    <link rel="icon" href="../build/icon.ico" type="image/x-icon" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "OpenAI Sans", system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(16, 185, 129, 0.18), transparent 36%),
          #0f1720;
        color: #e5f3ee;
      }

      main {
        width: min(30rem, calc(100vw - 2rem));
        padding: 2rem 1.5rem;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 1.25rem;
        background: rgba(15, 23, 32, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #c6d4cf;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Completing your Google sign-in</h1>
      <p id="oauth-status">Please wait while we finish the authentication flow.</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../src/js/matrix-session.js"></script>
    <script src="../src/js/matrix-oauth-callback.js"></script>
  </body>
</html>
